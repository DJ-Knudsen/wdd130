<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        /* Insert styles here */
        body {
            background: #E8ECED;
        }
        #wrapper {
            display: flex;
            flex-direction: column;
            border: 3px solid #000000;
            width: 1000px;
            border-radius: 5%;
            align-items: center;
            background: url(images/christus.webp);
            margin: auto;
            text-align: center;
        }
        .councilor{
            border: 10px solid #FFFFFF;
            width: 160px;
            height: 160px;
            border-radius: 50%;
        }
        .president{
            border: 10px solid #FFFFFF;
            width: 180px;
            height: 180px;
            border-radius: 50%;
        }
        .apostle{
            border: 10px solid #FFFFFF;
            width: 120px;
            height: 120px;
            border-radius: 50%;
        }
        h1 {
            color:#FFFFFF;
            font-family: arial;
        }
        h2 {
            color:#FFFFFF;
            font-family: arial;
        }
        #grid{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: auto auto auto;
        }
        #grid2{
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-template-rows: auto auto auto;
        }
    </style>
</head>
    <body>
        <div id="wrapper">
            <h1>First Presidency</h1>
            <div id="grid">
                <img class="councilor" src="images/eyring.webp" alt="President Eyring">
                <img class="president" src="images/oaks.webp" alt="President Oaks">
                <img class="councilor" src="images/christofferson.webp" alt="President Christofferson">
            </div>
            <h2>Quorum of the Twelve Apostles</h2>
            <div id="grid2">
                <img class="apostle" src="images/holland.webp" alt="President Holland">
                <img class="apostle" src="images/uchtdorf.webp" alt="Elder Uchtdorf">
                <img class="apostle" src="images/bednar.webp" alt="Elder Bednar">
                <img class="apostle" src="images/cook.webp" alt="Elder Cook">
                <img class="apostle" src="images/anderson.webp" alt="Elder Anserson">
                <img class="apostle" src="images/rasband.webp" alt="Elder Rasband">
                <img class="apostle" src="images/stevenson.webp" alt="Elder Stevenson">
                <img class="apostle" src="images/renlund.webp" alt="Elder Renlund">
                <img class="apostle" src="images/gong.webp" alt="Elder Gong">
                <img class="apostle" src="images/soares.webp" alt="Elder Soares">
                <img class="apostle" src="images/kearon.webp" alt="Elder Kearon">
                <img class="apostle" src="images/causse.webp" alt="Elder Causse">
            </div>
        </div>
    </body>

</html>
